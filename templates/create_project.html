<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация проекта - CrowdSpark</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
    <style>
        .form-container {
            max-width: 700px;
            margin: 100px auto;
            background: linear-gradient(135deg, #111111 0%, #1a1a1a 100%);
            padding: 40px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .form-label {
            color: #a0a0a0;
            font-weight: 500;
            margin-bottom: 8px;
        }
        .form-control, .form-select {
            background: #0a0a0a;
            border: 1px solid rgba(255,255,255,0.1);
            color: #ffffff;
            padding: 12px;
        }
        .form-control:focus, .form-select:focus {
            background: #0a0a0a;
            border-color: #667eea;
            color: #ffffff;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .file-upload-wrapper {
            position: relative;
            margin-bottom: 1.5rem;
        }
        .file-upload-label {
            display: block;
            padding: 40px 20px;
            border: 2px dashed rgba(102, 126, 234, 0.5);
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(102, 126, 234, 0.05);
        }
        .file-upload-label:hover {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.1);
        }
        .file-upload-input {
            position: absolute;
            width: 0.1px;
            height: 0.1px;
            opacity: 0;
            overflow: hidden;
            z-index: -1;
        }
        .file-upload-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }
        .file-upload-text {
            color: #888;
            font-size: 0.9rem;
        }
        .file-name {
            margin-top: 10px;
            color: #667eea;
            font-size: 0.9rem;
        }
        .image-preview {
            margin-top: 15px;
            max-width: 100%;
            border-radius: 8px;
            display: none;
        }
        .image-preview.show {
            display: block;
        }
        .divider {
            margin: 30px 0;
            border-top: 1px solid rgba(255,255,255,0.1);
            position: relative;
        }
        .divider-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1a1a1a;
            padding: 0 15px;
            color: #666;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container">
        <a class="navbar-brand" href="{{ url_for('index') }}">CrowdSpark</a>
    </div>
</nav>

<div class="container">
    <div class="form-container">
        <h2 class="text-center mb-4">Регистрация проекта</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ 'danger' if category == 'error' else 'success' }} alert-dismissible fade show">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST" enctype="multipart/form-data">
            <div class="mb-3">
                <label class="form-label">Название проекта *</label>
                <input type="text" class="form-control" name="title" required
                       placeholder="Например: Умные зеркала">
            </div>

            <div class="mb-3">
                <label class="form-label">Ваш Email *</label>
                <input type="email" class="form-control" name="creator_email" required
                       placeholder="founder@company.com">
            </div>

            <div class="mb-3">
                <label class="form-label">Категория</label>
                <select class="form-select" name="category">
                    <option value="Стартапы">Стартапы</option>
                    <option value="Технологии">Технологии</option>
                    <option value="Приложения">Приложения</option>
                    <option value="Искусство">Искусство</option>
                    <option value="Благотворительность">Благотворительность</option>
                    <option value="Образование">Образование</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Цель сбора (₽) *</label>
                <input type="number" class="form-control" name="goal_amount" required
                       min="1000" placeholder="500000">
            </div>

            <div class="mb-3">
                <label class="form-label">Сайт проекта</label>
                <input type="url" class="form-control" name="project_url"
                       placeholder="https://yourproject.com">
            </div>

            <div class="divider">
                <span class="divider-text">Изображение проекта</span>
            </div>

            <div class="file-upload-wrapper">
                <label class="file-upload-label" id="dropZone">
                    <div class="file-upload-icon">📁</div>
                    <div class="file-upload-text">
                        <strong>Нажмите для загрузки</strong><br>
                        или перетащите файл сюда<br>
                        <small class="text-muted">PNG, JPG, GIF, WEBP до 16MB</small>
                    </div>
                    <input type="file" class="file-upload-input" name="image"
                           id="imageInput" accept="image/*">
                </label>
                <div class="file-name" id="fileName"></div>
                <img class="image-preview" id="imagePreview" alt="Preview">
            </div>

            <div class="mb-3">
                <label class="form-label">Или укажите URL изображения</label>
                <input type="url" class="form-control" name="image_url"
                       placeholder="https://example.com/image.jpg">
                <small class="text-muted">Если не загружать файл</small>
            </div>

            <div class="mb-4">
                <label class="form-label">Описание проекта *</label>
                <textarea class="form-control" name="description" rows="5" required
                          placeholder="Расскажите о своей идее..."></textarea>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-3">
                Отправить проект на модерацию
            </button>
        </form>

        <div class="text-center mt-4">
            <a href="{{ url_for('index') }}" class="text-secondary text-decoration-none">
                ← Вернуться на главную
            </a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Обработка загрузки файлов
    const imageInput = document.getElementById('imageInput');
    const fileName = document.getElementById('fileName');
    const imagePreview = document.getElementById('imagePreview');
    const dropZone = document.getElementById('dropZone');

    imageInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            fileName.textContent = `Выбран файл: ${file.name}`;

            // Предпросмотр изображения
            const reader = new FileReader();
            reader.onload = function(e) {
                imagePreview.src = e.target.result;
                imagePreview.classList.add('show');
            };
            reader.readAsDataURL(file);
        }
    });

    // Drag and drop
    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.style.borderColor = '#667eea';
        dropZone.style.background = 'rgba(102, 126, 234, 0.15)';
    });

    dropZone.addEventListener('dragleave', (e) => {
        e.preventDefault();
        dropZone.style.borderColor = 'rgba(102, 126, 234, 0.5)';
        dropZone.style.background = 'rgba(102, 126, 234, 0.05)';
    });

    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.style.borderColor = 'rgba(102, 126, 234, 0.5)';
        dropZone.style.background = 'rgba(102, 126, 234, 0.05)';

        const files = e.dataTransfer.files;
        if (files.length) {
            imageInput.files = files;
            imageInput.dispatchEvent(new Event('change'));
        }
    });
</script>

</body>
</html>
